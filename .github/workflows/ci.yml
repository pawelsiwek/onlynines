name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/OnlyNines.Core.Tests -c Release
      - run: dotnet build src/OnlyNines.Web -c Release

  dataset-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if any SLA file is older than 90 days
        run: |
          set -e
          today=$(date +%s)
          stale=0
          for f in data/sla/*.yaml; do
            d=$(grep -oP 'lastVerified:\s*"\K[0-9-]+' "$f" || true)
            if [ -z "$d" ]; then echo "::error file=$f::missing lastVerified"; stale=1; continue; fi
            age=$(( (today - $(date -d "$d" +%s)) / 86400 ))
            if [ "$age" -gt 90 ]; then echo "::error file=$f::lastVerified $d is $age days old"; stale=1; fi
          done
          exit $stale
